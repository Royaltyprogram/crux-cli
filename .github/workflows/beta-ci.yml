name: Closed Beta CI

on:
  push:
    branches:
      - main
    tags:
      - '*'
  pull_request:
  workflow_dispatch:
    inputs:
      version:
        description: Release tag or version label to build and publish
        required: false
        type: string
      draft:
        description: Publish as a draft release
        required: false
        default: false
        type: boolean
      prerelease:
        description: Publish as a prerelease
        required: false
        default: true
        type: boolean
      latest:
        description: Mark the release as latest
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run repository verification
        run: make ci-beta

      - name: Start local closed beta server
        run: |
          APP_MODE=local ./output/server > /tmp/agentopt-server.log 2>&1 &
          echo $! > /tmp/agentopt-server.pid

      - name: Wait for liveness
        run: |
          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8082/healthz >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "server did not become healthy" >&2
          exit 1

      - name: Run closed beta smoke
        env:
          BETA_SMOKE_EMAIL: demo@example.com
          BETA_SMOKE_PASSWORD: demo1234
        run: ./scripts/closed_beta_smoke.sh

      - name: Run closed beta prod smoke
        env:
          BETA_SMOKE_EMAIL: beta1@example.com
          BETA_SMOKE_PASSWORD: replace-me
          SERVER_LOG_PATH: /tmp/agentopt-prod-server.log
        run: make closed-beta-prod-smoke

      - name: Upload beta binaries
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: agentopt-beta-binaries-${{ github.sha }}
          path: |
            output/server
            output/agentopt
          if-no-files-found: ignore

      - name: Stop local server
        if: always()
        run: |
          if [ -f /tmp/agentopt-server.pid ]; then
            kill "$(cat /tmp/agentopt-server.pid)" || true
          fi

      - name: Upload server log
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: agentopt-beta-server-log-${{ github.sha }}
          path: /tmp/agentopt-server.log
          if-no-files-found: ignore

      - name: Upload prod server log
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: agentopt-beta-prod-server-log-${{ github.sha }}
          path: /tmp/agentopt-prod-server.log
          if-no-files-found: ignore

      - name: Dump server log on failure
        if: failure()
        run: |
          cat /tmp/agentopt-server.log || true
          cat /tmp/agentopt-prod-server.log || true

  bundle:
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build beta bundle
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION_LABEL: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || github.event.inputs.version || '' }}
        run: make beta-cli-bundle

      - name: Verify beta bundle
        run: make verify-beta-bundle

      - name: Upload beta bundle artifact
        uses: actions/upload-artifact@v6
        with:
          name: agentopt-beta-bundle-${{ matrix.goos }}-${{ matrix.goarch }}-${{ github.sha }}
          path: |
            output/release/*.tar.gz
            output/release/*.tar.gz.sha256
            output/release/*.json
          if-no-files-found: error

  release-index:
    needs: bundle
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Download beta bundle artifacts
        uses: actions/download-artifact@v7
        with:
          path: output/release
          pattern: agentopt-beta-bundle-*-${{ github.sha }}
          merge-multiple: true

      - name: Build release index
        env:
          VERSION_LABEL: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || github.event.inputs.version || '' }}
        run: make build-release-index

      - name: Upload release index artifact
        uses: actions/upload-artifact@v6
        with:
          name: agentopt-beta-release-index-${{ github.sha }}
          path: |
            output/release/*.release-index.json
            output/release/*.release-index.json.sha256
          if-no-files-found: error

  publish-release:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    needs: release-index
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Download beta bundle artifacts
        uses: actions/download-artifact@v7
        with:
          path: output/release
          pattern: agentopt-beta-bundle-*-${{ github.sha }}
          merge-multiple: true

      - name: Download release index artifact
        uses: actions/download-artifact@v7
        with:
          path: output/release
          pattern: agentopt-beta-release-index-${{ github.sha }}
          merge-multiple: true

      - name: Publish GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION_LABEL: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || github.event.inputs.version || '' }}
          DRAFT: ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.draft == 'true' && '1' || '0') || '' }}
          PRERELEASE: ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.prerelease == 'true' && '1' || '0') || '' }}
          LATEST_MODE: ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.latest == 'true' && 'true' || 'false') || '' }}
        run: make publish-github-release
