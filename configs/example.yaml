App:
  Addr: ":8082"
  Mode: release
  APIToken: ""

DB:
  Dialect: mysql
  DSN: user:passwd@tcp(127.0.0.1:3306)/database?charset=utf8mb4&parseTime=True&loc=Local
  MaxIdle: 100
  MaxActive: 100
  MaxLifetime: 300
  AutoMigrate: false

Redis:
  Addr: 127.0.0.1:6379
  DB: 0
  Password: ""

Log:
  FileDir: log
  MaxSize: 100
  MaxBackups: 5
  MaxAge: 60
  Compress: false
  LocalTime: false
  AddSource: true

Jwt:
  Secret: "secret_122"
  Issuer: "test.com"

Auth:
  AllowDemoUser: false
  StaticTokenEnabled: false
  BootstrapUsers:
    - ID: beta-user-1
      OrgID: beta-org
      OrgName: Beta Org
      Email: beta1@example.com
      Name: Beta Operator 1
      Password: "replace-me"

HTTP:
  AllowedOrigins:
    - https://dashboard.example.com
  RateLimitPerMinute: 60
  LogToStdout: true
