App:
  Addr: ":8082"
  Mode: prod
  # Legacy JSON import path. DB.DSN is the primary runtime store.
  StorePath: "data/crux-store.json"
  APIToken: ""

DB:
  Dialect: mysql
  DSN: user:passwd@tcp(127.0.0.1:3306)/database?charset=utf8mb4&parseTime=True&loc=UTC
  MaxIdle: 2
  MaxActive: 4
  MaxLifetime: 300
  AutoMigrate: false

Redis:
  Addr: 127.0.0.1:6379
  DB: 0
  Password: ""

Log:
  FileDir: log
  MaxSize: 100
  MaxBackups: 5
  MaxAge: 60
  Compress: false
  LocalTime: false
  AddSource: true

Jwt:
  Secret: ""
  Issuer: "crux.local"

Auth:
  AllowDemoUser: false
  StaticTokenEnabled: false
  BootstrapUsers: []
  Google:
    ClientID: ""
    ClientSecret: ""
    AllowedDomains: []

HTTP:
  AllowedOrigins: []
  AllowedCIDRs: []
  AdminAllowedCIDRs: []
  TrustedProxyCIDRs: []
  RateLimitPerMinute: 60
  LogToStdout: true

OpenAI:
  APIKey: ""
  BaseURL: ""
  ResponsesModel: "gpt-5.4"
