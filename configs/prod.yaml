App:
  Addr: ":8082"
  Mode: prod
  StorePath: "data/agentopt-store.json"
  APIToken: ""

DB:
  Dialect: sqlite3
  DSN: data/agentopt.db?_fk=1
  MaxIdle: 2
  MaxActive: 4
  MaxLifetime: 300
  AutoMigrate: false

Redis:
  Addr: 127.0.0.1:6379
  DB: 0
  Password: ""

Log:
  FileDir: log
  MaxSize: 100
  MaxBackups: 5
  MaxAge: 60
  Compress: false
  LocalTime: false
  AddSource: true

Jwt:
  Secret: ""
  Issuer: "agentopt.local"

Auth:
  AllowDemoUser: false
  StaticTokenEnabled: false
  BootstrapUsers: []

HTTP:
  AllowedOrigins: []
  RateLimitPerMinute: 60
  LogToStdout: true
