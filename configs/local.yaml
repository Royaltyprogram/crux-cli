App:
  Addr: ":8082"
  Mode: local
  StorePath: "data/agentopt-store.json"
  APIToken: "agentopt-dev-token"

DB:
  Dialect: sqlite3
  DSN: data/agentopt-local.db?_fk=1
  MaxIdle: 2
  MaxActive: 4
  MaxLifetime: 300
  AutoMigrate: false

Redis:
  Addr: 127.0.0.1:6379
  DB: 0
  Password: ""

Log:
  FileDir: log
  MaxSize: 100
  MaxBackups: 5
  MaxAge: 60
  Compress: false
  LocalTime: false
  AddSource: true

Jwt:
  Secret: "dev-secret"
  Issuer: "agentopt.local"

Auth:
  AllowDemoUser: true
  StaticTokenEnabled: true
  BootstrapUsers: []

HTTP:
  AllowedOrigins:
    - http://127.0.0.1:8082
    - http://localhost:8082
  RateLimitPerMinute: 120
  LogToStdout: true
