<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — AutoSkills</title>
  <link rel="icon" href="/assets/logo.ico" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --canvas-top: #f3ece1;
      --canvas-bottom: #e8f0ec;
      --surface: rgba(255, 255, 255, 0.95);
      --surface-soft: rgba(247, 249, 247, 0.94);
      --line: rgba(20, 33, 42, 0.10);
      --line-strong: rgba(20, 33, 42, 0.16);
      --ink: #14212a;
      --muted: #5a6973;
      --accent: #a75231;
      --accent-deep: #7d3a1f;
      --support: #1e6870;
      --support-light: rgba(30, 104, 112, 0.08);
      --shadow-sm: 0 2px 8px rgba(20, 33, 42, 0.06);
      --shadow-md: 0 8px 24px rgba(20, 33, 42, 0.08);
      --shadow-lg: 0 18px 42px rgba(20, 33, 42, 0.10);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { color-scheme: light; }

    body {
      color: var(--ink);
      font-family: 'Inter', -apple-system, sans-serif;
      font-size: 16px;
      line-height: 1.6;
      background: linear-gradient(168deg, var(--canvas-top) 0%, #f7f4ee 40%, var(--canvas-bottom) 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── NAV ── */
    .nav {
      backdrop-filter: blur(16px) saturate(1.4);
      -webkit-backdrop-filter: blur(16px) saturate(1.4);
      background: rgba(243, 236, 225, 0.72);
      border-bottom: 1px solid var(--line);
    }
    .nav-inner {
      max-width: 1120px; margin: 0 auto; padding: 0 24px;
      height: 64px; display: flex; align-items: center;
    }
    .nav-brand { display: flex; align-items: center; gap: 10px; text-decoration: none; color: var(--ink); }
    .nav-logo { width: 32px; height: 32px; border-radius: 8px; object-fit: contain; }
    .nav-wordmark { font-family: 'DM Serif Display', serif; font-size: 20px; letter-spacing: -0.02em; }

    /* ── LOGIN CARD ── */
    .login-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
    }

    .login-card {
      width: 100%;
      max-width: 420px;
      padding: 40px 36px;
      border-radius: 24px;
      border: 1px solid var(--line);
      background: var(--surface);
      box-shadow: var(--shadow-lg);
    }

    .login-header {
      text-align: center;
      margin-bottom: 32px;
    }
    .login-header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 28px;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }
    .login-header p {
      color: var(--muted);
      font-size: 15px;
      line-height: 1.5;
    }

    .login-providers {
      display: grid;
      gap: 12px;
    }

    .provider-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      padding: 14px 20px;
      border: 1px solid var(--line-strong);
      border-radius: 14px;
      background: var(--surface);
      color: var(--ink);
      font: inherit;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
    }
    .provider-btn:hover {
      transform: translateY(-1px);
      box-shadow: var(--shadow-md);
      background: var(--surface-soft);
    }

    .provider-icon {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }

    .login-divider {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 24px 0;
      color: var(--muted);
      font-size: 13px;
      font-weight: 500;
    }
    .login-divider::before,
    .login-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--line);
    }

    .login-footer {
      text-align: center;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.5;
    }
    .login-footer a {
      color: var(--support);
      text-decoration: none;
      font-weight: 600;
    }
    .login-footer a:hover {
      text-decoration: underline;
    }

    /* ── STATUS ── */
    .status {
      margin-top: 16px;
      padding: 10px 14px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: var(--surface-soft);
      font-size: 13px;
      line-height: 1.5;
      color: var(--muted);
      text-align: center;
    }
    .status:empty { display: none; }
    .status[data-tone="error"] {
      border-color: rgba(162, 61, 51, 0.22);
      background: rgba(255, 246, 245, 0.96);
      color: #a23d33;
    }

    /* ── FOOTER ── */
    .footer {
      border-top: 1px solid var(--line);
      background: rgba(243, 236, 225, 0.4);
    }
    .footer-inner {
      max-width: 1120px; margin: 0 auto; padding: 24px;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; color: var(--muted);
    }

    @media (max-width: 480px) {
      .login-card { padding: 32px 24px; }
    }
  </style>
</head>

<body>

  <nav class="nav">
    <div class="nav-inner">
      <a class="nav-brand" href="/">
        <img src="/assets/logo.svg" alt="AutoSkills" class="nav-logo">
        <span class="nav-wordmark">AutoSkills</span>
      </a>
    </div>
  </nav>

  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-header">
        <h1>Welcome to AutoSkills</h1>
        <p>Sign in to your account or create a new one.</p>
      </div>

      <div class="login-providers">
        <a class="provider-btn" href="/api/v1/auth/google/start">
          <svg class="provider-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Continue with Google
        </a>
      </div>

      <div class="login-divider">More providers coming soon</div>

      <div class="login-footer">
        By continuing, you agree to AutoSkills's terms of service.
        <br>
        <a href="/">Back to home</a>
      </div>

      <div class="status" id="status" data-tone="info" aria-live="polite"></div>
    </div>
  </div>

  <footer class="footer">
    <div class="footer-inner">
      AutoSkills &middot; Understand What Your Codex Agent Actually Did
    </div>
  </footer>

  <script>
    (function () {
      try {
        const params = new URLSearchParams(window.location.search);
        const authError = params.get("auth_error");
        const authNotice = params.get("auth_notice");
        const status = document.getElementById("status");
        if (authError) {
          status.textContent = authError;
          status.dataset.tone = "error";
        } else if (authNotice) {
          status.textContent = authNotice;
          status.dataset.tone = "info";
        }
        if (authError || authNotice) {
          params.delete("auth_error");
          params.delete("auth_notice");
          const nextQuery = params.toString();
          const nextURL = nextQuery ? window.location.pathname + "?" + nextQuery : window.location.pathname;
          window.history.replaceState({}, "", nextURL);
        }
      } catch (e) {}
    })();
  </script>
</body>

</html>
